version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: eventbooking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-vtu@27138}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-event_booking_system}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-vtu@27138}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: eventbooking-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-vtu@27138}
      DB_NAME: ${MYSQL_DATABASE:-event_booking_system}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_strong_secret}
      JWT_EXPIRES_IN: 1d
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Department Events <no-reply@college.edu>}
      FRONTEND_DIST_PATH: /app/backend/frontend-dist
    ports:
      - "${APP_PORT:-80}:5000"

volumes:
  mysql_data:
